<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookstore Manager</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Online Bookstore</p>
        <h1>Bookstore Manager</h1>
      </div>
      <a class="api-link" href="/api">API</a>
    </header>

    <main class="layout">
      <section class="panel form-panel" aria-labelledby="form-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Book Details</p>
            <h2 id="form-title">Add Book</h2>
          </div>
          <button class="ghost-button" id="reset-form" type="button">Clear</button>
        </div>

        <form id="book-form" class="book-form">
          <input type="hidden" id="book-id" />

          <label>
            Title
            <input id="title" name="title" type="text" required />
          </label>

          <label>
            Author
            <input id="author" name="author" type="text" required />
          </label>

          <label>
            Genre
            <input id="genre" name="genre" type="text" />
          </label>

          <div class="field-row">
            <label>
              Price
              <input id="price" name="price" type="number" min="0" step="0.01" required />
            </label>

            <label>
              Published
              <input id="publishedDate" name="publishedDate" type="date" />
            </label>
          </div>

          <label class="checkbox-field">
            <input id="inStock" name="inStock" type="checkbox" checked />
            In stock
          </label>

          <button class="primary-button" id="submit-button" type="submit">Add Book</button>
        </form>
      </section>

      <section class="content" aria-labelledby="books-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Inventory</p>
            <h2 id="books-title">Books</h2>
          </div>
          <p class="summary" id="summary">Loading...</p>
        </div>

        <form id="search-form" class="search-bar">
          <label>
            Title
            <input id="search-title" type="search" placeholder="Search title" />
          </label>
          <label>
            Author
            <input id="search-author" type="search" placeholder="Search author" />
          </label>
          <label>
            Genre
            <input id="search-genre" type="search" placeholder="Search genre" />
          </label>
          <label>
            Stock
            <select id="search-stock">
              <option value="">All</option>
              <option value="true">In stock</option>
              <option value="false">Out of stock</option>
            </select>
          </label>
          <div class="search-actions">
            <button class="secondary-button" type="submit">Search</button>
            <button class="ghost-button" id="clear-search" type="button">Reset</button>
          </div>
        </form>

        <div class="message" id="message" role="status" aria-live="polite"></div>
        <div class="book-grid" id="book-list"></div>

        <nav class="pagination" aria-label="Pagination">
          <button class="ghost-button" id="prev-page" type="button">Previous</button>
          <span id="page-info">Page 1 of 1</span>
          <button class="ghost-button" id="next-page" type="button">Next</button>
        </nav>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
